# application.yml
spring:
  application:
    name: secure-api

  # Database Configuration
  datasource:
    url: jdbc:postgresql://localhost:5432/secure_db
    username: ${DB_USERNAME:secure_user}
    password: ${DB_PASSWORD:secure_password}
    hikari:
      maximum-pool-size: 10
      minimum-idle: 5
      connection-timeout: 30000
      idle-timeout: 600000

  # JPA Configuration
  jpa:
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          batch_size: 20
        format_sql: false
        show_sql: false

  # Flyway Migration
  flyway:
    enabled: true
    baseline-on-migrate: true

  # Redis Configuration
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      timeout: 5000ms

  # Mail Configuration (for 2FA)
  mail:
    host: smtp.gmail.com
    port: 587
    username: ${MAIL_USERNAME}
    password: ${MAIL_PASSWORD}
    properties:
      mail:
        smtp:
          auth: true
          starttls:
            enable: true

  # Jackson Configuration
  jackson:
    serialization:
      write-dates-as-timestamps: false
      indent-output: false
    deserialization:
      fail-on-unknown-properties: true

# JWT Configuration
jwt:
  secret: ${JWT_SECRET:404E635266556A586E3272357538782F413F4428472B4B6250645367566B5970}
  access-expiration: 900000  # 15 minutes
  refresh-expiration: 604800000  # 7 days

# Rate Limiting
rate-limit:
  enabled: true
  default-limit: 100  # requests per hour
  login-limit: 5      # attempts per 15 minutes
  api-limit: 1000     # requests per hour

# Security
security:
  max-login-attempts: 5
  lockout-duration: 15  # minutes
  password-expiry-days: 90
  session-timeout: 30   # minutes

# 2FA Configuration
two-factor:
  enabled: true
  issuer: SecureAPI

# CORS Configuration
cors:
  allowed-origins:
    - http://localhost:3000
    - https://yourdomain.com
  allowed-methods:
    - GET
    - POST
    - PUT
    - DELETE
    - OPTIONS

# Logging
logging:
  level:
    com.example: INFO
    org.springframework.security: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} [%thread] %-5level %logger{36} - %msg%n"
  file:
    name: logs/secure-api.log
    max-size: 10MB
    max-history: 30

# Actuator
management:
  endpoints:
    web:
      exposure:
        include: health,metrics,prometheus
      base-path: /actuator
  endpoint:
    health:
      show-details: when-authorized
      roles: ACTUATOR
  metrics:
    export:
      prometheus:
        enabled: true

# Server
server:
  port: 8080
  error:
    include-stacktrace: never
    include-message: always
  servlet:
    session:
      timeout: 30m
      cookie:
        http-only: true
        secure: true
        same-site: strict
